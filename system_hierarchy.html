<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Terminal — Full System Hierarchy</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --purple: #bc8cff; --cyan: #39d2c0; --pink: #f778ba;
    --yellow: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 6px; color: var(--accent); }
  .subtitle { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .stats-bar { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-val { font-size: 28px; font-weight: bold; color: var(--green); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* Controls */
  .controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .ctrl-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Search */
  .search-box { display: flex; justify-content: center; margin-bottom: 20px; }
  .search-box input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; width: 400px; font-family: inherit; font-size: 13px; outline: none; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  /* Layer sections */
  .layer { margin-bottom: 24px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .layer-header { padding: 12px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
  .layer-header:hover { filter: brightness(1.2); }
  .layer-chevron { transition: transform 0.2s; font-size: 12px; }
  .layer-chevron.open { transform: rotate(90deg); }
  .layer-title { font-size: 14px; font-weight: bold; flex: 1; }
  .layer-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); }
  .layer-body { padding: 0 18px 18px; display: none; }
  .layer-body.open { display: block; }

  /* Module cards */
  .module-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
  .module-card:hover { border-color: var(--accent); }
  .module-card.highlight { border-color: var(--yellow); box-shadow: 0 0 8px rgba(227,179,65,0.3); }
  .module-header { padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .module-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; flex-shrink: 0; }
  .module-name { font-weight: bold; font-size: 13px; flex: 1; }
  .module-purpose { font-size: 11px; color: var(--muted); flex: 2; }
  .module-counts { display: flex; gap: 8px; font-size: 11px; }
  .module-counts span { padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); }
  .fn-count { color: var(--cyan); }
  .cls-count { color: var(--purple); }
  .meth-count { color: var(--pink); }

  .module-body { display: none; padding: 0 14px 12px; }
  .module-body.open { display: block; }

  /* Function/class lists */
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 10px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .fn-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .fn-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(57,210,192,0.1); color: var(--cyan); border: 1px solid rgba(57,210,192,0.2); }
  .fn-tag.private { opacity: 0.5; }
  .fn-tag.highlight { background: rgba(227,179,65,0.2); color: var(--yellow); border-color: var(--yellow); }
  .cls-block { margin-bottom: 8px; }
  .cls-name { font-size: 12px; font-weight: bold; color: var(--purple); margin-bottom: 4px; }
  .method-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(188,140,255,0.1); color: var(--purple); border: 1px solid rgba(188,140,255,0.15); }
  .method-tag.private { opacity: 0.5; }
  .method-tag.highlight { background: rgba(227,179,65,0.2); color: var(--yellow); border-color: var(--yellow); }
  .method-tag.dunder { opacity: 0.35; }

  /* Data flow diagram */
  .flow-section { margin-bottom: 24px; }
  .flow-title { text-align: center; font-size: 16px; color: var(--accent); margin-bottom: 16px; }
  .flow-container { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .flow-row { display: flex; align-items: center; gap: 12px; }
  .flow-box { padding: 10px 20px; border-radius: 8px; font-size: 12px; text-align: center; min-width: 180px; border: 1px solid; }
  .flow-arrow { color: var(--muted); font-size: 18px; padding: 4px 0; }
  .flow-arrow-h { color: var(--muted); font-size: 14px; }
  .flow-external { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
  .flow-data { background: rgba(57,210,192,0.1); border-color: var(--cyan); color: var(--cyan); }
  .flow-analysis { background: rgba(88,166,255,0.1); border-color: var(--accent); color: var(--accent); }
  .flow-ml { background: rgba(188,140,255,0.1); border-color: var(--purple); color: var(--purple); }
  .flow-exec { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
  .flow-notify { background: rgba(210,153,34,0.1); border-color: var(--orange); color: var(--orange); }

  /* Toggle for private functions */
  .toggle-private { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .toggle-private input { accent-color: var(--accent); }

  @media (max-width: 800px) {
    .module-header { flex-wrap: wrap; }
    .module-purpose { flex-basis: 100%; }
  }
</style>
</head>

// ========== RENDER ==========
const container = document.getElementById('layers-container');

function renderTag(name, cls, isHighlight) {
  const isPrivate = name.startsWith('_') && !name.startsWith('__');
  const isDunder = name.startsWith('__') && name.endsWith('__');
  let classes = cls;
  if (isPrivate) classes += ' private';
  if (isDunder) classes += ' dunder';
  if (isHighlight) classes += ' highlight';
  return `<span class="${classes}" data-name="${name.toLowerCase()}">${name}</span>`;
}

function renderModule(mod, layerColor) {
  const fnCount = mod.fns.length;
  const clsCount = mod.classes.length;
  const methCount = mod.classes.reduce((s,c) => s + c.methods.length, 0);

  let body = '';

  if (fnCount > 0) {
    body += `<div class="section-label">Functions (${fnCount})</div><div class="fn-list">`;
    for (const fn of mod.fns) body += renderTag(fn, 'fn-tag', false);
    body += `</div>`;
  }

  for (const cls of mod.classes) {
    body += `<div class="cls-block"><div class="cls-name">${cls.name}</div>`;
    if (cls.methods.length > 0) {
      body += `<div class="fn-list">`;
      for (const m of cls.methods) body += renderTag(m, 'method-tag', false);
      body += `</div>`;
    } else {
      body += `<div style="font-size:11px;color:var(--muted);margin-left:8px;">dataclass (no methods)</div>`;
    }
    body += `</div>`;
  }

  if (!body) body = `<div style="font-size:11px;color:var(--muted);">Constants / schema only</div>`;

  const countsHtml = [
    fnCount > 0 ? `<span class="fn-count">${fnCount} fn</span>` : '',
    clsCount > 0 ? `<span class="cls-count">${clsCount} cls</span>` : '',
    methCount > 0 ? `<span class="meth-count">${methCount} meth</span>` : ''
  ].filter(Boolean).join('');

  return `<div class="module-card" data-module="${mod.name.toLowerCase()}">
    <div class="module-header" onclick="toggleModule(this)">
      <div class="module-icon" style="background:${layerColor}22;color:${layerColor};border:1px solid ${layerColor}44;">${mod.name[0].toUpperCase()}</div>
      <div class="module-name">${mod.name}.py</div>
      <div class="module-purpose">${mod.purpose}</div>
      <div class="module-counts">${countsHtml}</div>
    </div>
    <div class="module-body">${body}</div>
  </div>`;
}

function renderLayer(layer, idx) {
  const totalFns = layer.modules.reduce((s,m) => s + m.fns.length, 0);
  const totalCls = layer.modules.reduce((s,m) => s + m.classes.length, 0);
  const totalMethods = layer.modules.reduce((s,m) => s + m.classes.reduce((ss,c) => ss + c.methods.length, 0), 0);

  let modulesHtml = '';
  for (const mod of layer.modules) {
    modulesHtml += renderModule(mod, layer.color);
  }

  return `<div class="layer" data-layer="${idx}">
    <div class="layer-header" style="background:${layer.color}15;" onclick="toggleLayer(this)">
      <span class="layer-chevron">&#9654;</span>
      <div class="module-icon" style="background:${layer.color}22;color:${layer.color};border:1px solid ${layer.color}44;">${layer.icon}</div>
      <div class="layer-title" style="color:${layer.color}">${layer.name}</div>
      <div style="flex:1;font-size:11px;color:var(--muted)">${layer.desc}</div>
      <div class="layer-badge">${layer.modules.length} modules &middot; ${totalFns} fn &middot; ${totalCls} cls &middot; ${totalMethods} meth</div>
    </div>
    <div class="layer-body">${modulesHtml}</div>
  </div>`;
}

// Build all layers
let html = '';
for (let i = 0; i < LAYERS.length; i++) {
  html += renderLayer(LAYERS[i], i);
}
container.innerHTML = html;

// ========== INTERACTIONS ==========
function toggleLayer(header) {
  const chevron = header.querySelector('.layer-chevron');
  const body = header.nextElementSibling;
  chevron.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleModule(header) {
  header.nextElementSibling.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.layer-chevron').forEach(c => open ? c.classList.add('open') : c.classList.remove('open'));
  document.querySelectorAll('.layer-body').forEach(b => open ? b.classList.add('open') : b.classList.remove('open'));
}

function toggleModules(open) {
  document.querySelectorAll('.module-body').forEach(b => open ? b.classList.add('open') : b.classList.remove('open'));
}

function togglePrivate() {
  const show = document.getElementById('showPrivate').checked;
  document.querySelectorAll('.fn-tag.private, .method-tag.private').forEach(el => {
    el.style.display = show ? '' : 'none';
  });
}

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();

  // Clear all highlights
  document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
  document.querySelectorAll('.module-card.highlight').forEach(el => el.classList.remove('highlight'));

  if (!q) return;

  // Highlight matching tags
  document.querySelectorAll('.fn-tag, .method-tag').forEach(tag => {
    const name = tag.getAttribute('data-name');
    if (name && name.includes(q)) {
      tag.classList.add('highlight');
      // Open parent containers
      const modBody = tag.closest('.module-body');
      if (modBody) modBody.classList.add('open');
      const layerBody = tag.closest('.layer-body');
      if (layerBody) {
        layerBody.classList.add('open');
        layerBody.previousElementSibling.querySelector('.layer-chevron').classList.add('open');
      }
    }
  });

  // Highlight matching modules
  document.querySelectorAll('.module-card').forEach(card => {
    const name = card.getAttribute('data-module');
    if (name && name.includes(q)) {
      card.classList.add('highlight');
      const layerBody = card.closest('.layer-body');
      if (layerBody) {
        layerBody.classList.add('open');
        layerBody.previousElementSibling.querySelector('.layer-chevron').classList.add('open');
      }
    }
  });

  // Highlight matching class names
  document.querySelectorAll('.cls-name').forEach(cls => {
    if (cls.textContent.toLowerCase().includes(q)) {
      const card = cls.closest('.module-card');
      if (card) card.classList.add('highlight');
      const modBody = cls.closest('.module-body');
      if (modBody) modBody.classList.add('open');
      const layerBody = cls.closest('.layer-body');
      if (layerBody) {
        layerBody.classList.add('open');
        layerBody.previousElementSibling.querySelector('.layer-chevron').classList.add('open');
      }
    }
  });
});

// Open first layer by default
document.querySelector('.layer-chevron').classList.add('open');
document.querySelector('.layer-body').classList.add('open');
</script>
